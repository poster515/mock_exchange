name: C++ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 cmake build-essential
        pip install conan==2.*
        conan profile detect

    - name: Build
      run: |
        mkdir -p build
        pwd
        ls -la
        conan install . --output-folder build --build=missing -s compiler.cppstd=20
        cmake -B build/build/Release -DCMAKE_TOOLCHAIN_FILE=./build/build/Release/generators/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release .
        pwd
        ls -la 
        cd ./build/build/Release
        clear && make -j8

    - name: Run tests
      run: |
        cd ./build/build/Debug/message_transport/test
        ctest --output-on-failure
