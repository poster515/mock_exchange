name: C++ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install CPP dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 cmake build-essential
        pip install conan==2.*
        conan profile detect

    - name: Install SBE and Java dependencies
      run: |
        sudo apt install default-jdk
        java -version
        cd ./sbe_messages/public/sbe
        curl -L https://repo1.maven.org/maven2/uk/co/real-logic/sbe-all/1.30.0/sbe-all-1.30.0.jar -o sbe-all.jar
        java -Dsbe.target.language=Cpp -Dsbe.output.dir=generated -jar sbe-all.jar order_entry.xml

    - name: Build
      run: |
        mkdir -p build
        pwd
        ls -la
        conan install . --output-folder build --build=missing -s compiler.cppstd=20
        cmake -B build/build/Release -DCMAKE_TOOLCHAIN_FILE=./build/build/Release/generators/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release .
        pwd
        ls -la 
        cd ./build/build/Release
        clear && make -j8
      env:
        TERM: xterm

    - name: Run tests
      run: |
        cd ./build/build/Release
        ctest --output-on-failure
